name: Cleanup rectumfire pending versions

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/cleanup_rectumfire_pending.yml"
  workflow_dispatch:

jobs:
  cleanup-pending:
    runs-on: ubuntu-latest
    steps:
      - name: Delete rectumfire 1.0.34 pending version
        shell: bash
        env:
          REGISTRY_ACCESS_TOKEN: ${{ secrets.REGISTRY_ACCESS_TOKEN }}
        run: |
          curl --silent --show-error --fail-with-body \
            --request DELETE \
            --url https://api.comfy.org/publishers/vladgohn/nodes/rectumfire/versions/1.0.34 \
            --header "Authorization: Bearer ${REGISTRY_ACCESS_TOKEN}"

      - name: Delete rectumfire 1.0.33 pending version
        shell: bash
        env:
          REGISTRY_ACCESS_TOKEN: ${{ secrets.REGISTRY_ACCESS_TOKEN }}
        run: |
          curl --silent --show-error --fail-with-body \
            --request DELETE \
            --url https://api.comfy.org/publishers/vladgohn/nodes/rectumfire/versions/1.0.33 \
            --header "Authorization: Bearer ${REGISTRY_ACCESS_TOKEN}"
