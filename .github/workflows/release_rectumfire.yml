name: Release RectumFire

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Bump patch version
        shell: bash
        run: |
          python - <<'PY'
          import re
          from pathlib import Path

          path = Path("pyproject.toml")
          text = path.read_text(encoding="utf-8")
          m = re.search(r'^version\s*=\s*"(\d+)\.(\d+)\.(\d+)"', text, re.M)
          if not m:
            raise SystemExit("version not found in pyproject.toml")

          major, minor, patch = map(int, m.groups())
          next_version = f'{major}.{minor}.{patch + 1}'
          text = re.sub(r'^version\s*=\s*"\d+\.\d+\.\d+"', f'version = "{next_version}"', text, count=1, flags=re.M)
          path.write_text(text, encoding="utf-8")
          print(next_version)
          Path(".release_version").write_text(next_version, encoding="utf-8")
          PY

      - name: Commit version bump
        shell: bash
        run: |
          VERSION="$(cat .release_version)"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml
          git commit -m "Release ${VERSION}"
          git push origin HEAD:main

      - name: Refresh workspace to pushed main
        shell: bash
        run: |
          git fetch origin main
          git reset --hard origin/main
          echo "Publishing version:"
          grep '^version' pyproject.toml

      - name: Resolve package ids
        shell: bash
        run: |
          python - <<'PY'
          import re
          from pathlib import Path

          text = Path("pyproject.toml").read_text(encoding="utf-8")

          def extract(pattern, default=""):
              m = re.search(pattern, text, re.M)
              return m.group(1).strip() if m else default

          project_name = extract(r'^name\s*=\s*"([^"]+)"')
          Path(".registry_node_id").write_text(project_name, encoding="utf-8")
          PY

      - name: Publish custom node
        uses: Comfy-Org/publish-node-action@main
        with:
          personal_access_token: ${{ secrets.REGISTRY_ACCESS_TOKEN }}

      - name: Build metadata payload
        shell: bash
        run: |
          python - <<'PY'
          import json, re
          from pathlib import Path

          text = Path("pyproject.toml").read_text(encoding="utf-8")

          def extract(pattern, default=""):
              m = re.search(pattern, text, re.M)
              return m.group(1).strip() if m else default

          project_name = extract(r'^name\s*=\s*"([^"]+)"')
          description = extract(r'^description\s*=\s*"([^"]+)"')
          repository = extract(r'^Repository\s*=\s*"([^"]+)"')
          display_name = extract(r'^DisplayName\s*=\s*"([^"]+)"')
          icon = extract(r'^Icon\s*=\s*"([^"]+)"')
          requires_comfyui = extract(r'^requires-comfyui\s*=\s*"([^"]+)"')

          payload = {
              "id": project_name,
              "name": display_name or project_name,
              "description": description,
              "icon": icon,
              "banner_url": "",
              "repository": repository,
              "license": "LICENSE",
              "preempted_comfy_node_names": [
                  "RectumFireTimer",
                  "RectumFireDone",
                  "RectumFireNote",
                  "RectumFireSwitch",
                  "RectumFireBanner",
                  "🔥Fire Label",
                  "Fire Label"
              ],
              "supported_os": ["OS Independent"],
              "supported_accelerators": [],
              "supported_comfyui_version": requires_comfyui,
              "supported_comfyui_frontend_version": ""
          }

          Path("registry_metadata.json").write_text(
              json.dumps(payload, ensure_ascii=False),
              encoding="utf-8"
          )
          PY

      - name: Update registry metadata
        shell: bash
        env:
          REGISTRY_ACCESS_TOKEN: ${{ secrets.REGISTRY_ACCESS_TOKEN }}
        run: |
          NODE_ID="$(cat .registry_node_id)"
          curl --fail-with-body \
            --request PUT \
            --url "https://api.comfy.org/publishers/vladgohn/nodes/${NODE_ID}" \
            --header "Authorization: Bearer ${REGISTRY_ACCESS_TOKEN}" \
            --header "Content-Type: application/json" \
            --data @registry_metadata.json
